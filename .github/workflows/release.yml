name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - uses: golangci/golangci-lint-action@v6
      - run: go test ./...

  release:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build binaries
        run: |
          ldflags="-s -w \
            -X github.com/driangle/skival/apps/cli/cmd.Version=${{ steps.version.outputs.VERSION }} \
            -X github.com/driangle/skival/apps/cli/cmd.commit=${{ github.sha }} \
            -X github.com/driangle/skival/apps/cli/cmd.suffix=release"
          platforms="linux/amd64 linux/arm64 darwin/amd64 darwin/arm64"
          for platform in $platforms; do
            os="${platform%/*}"
            arch="${platform#*/}"
            output="skival-${os}-${arch}"
            GOOS=$os GOARCH=$arch go build -ldflags "$ldflags" -o "dist/${output}" ./apps/cli
          done

      - name: Package archives and checksums
        working-directory: dist
        run: |
          for bin in skival-*; do
            tar czf "${bin}.tar.gz" "$bin"
            rm "$bin"
          done
          sha256sum *.tar.gz > checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

  homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: mislav/bump-homebrew-formula-action@v3
        with:
          formula-name: skival
          homebrew-tap: driangle/homebrew-tap
          download-url: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/skival-darwin-arm64.tar.gz
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
