# Simplest valid suite: one eval, one control variant, inline prompt.
version: 1

defaults:
  runner: claude-code

evals:
  - id: hello
    dir: "./workdir"
    prompt: "Write a file called hello.txt containing 'Hello, World!'"
    verify:
      - type: file_contains
        path: hello.txt
        contains: "Hello, World!"
    variants:
      - name: baseline
        model: "claude-sonnet-4-6"
      - name: opus-model
        model: "claude-opus-4-6"
