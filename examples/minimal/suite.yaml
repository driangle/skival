# Simplest valid suite: one eval, one control treatment, inline prompt.
version: 1

evals:
  - id: hello
    prompt: "Write a file called hello.txt containing 'Hello, World!'"
    model: "claude-sonnet-4-6"
    treatments:
      control:
        name: baseline
      variations:
        - name: opus-model
          model: "claude-opus-4-6"
