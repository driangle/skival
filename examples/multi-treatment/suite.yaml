# Multiple variants with different models, skills, env vars,
# and runner_config.
version: 1
description: "Demonstrates multiple variant configurations"

defaults:
  runner: claude-code
  samples: 3
  timeout: 90

evals:
  - id: sort-algorithm
    name: "Sorting Algorithm"
    prompt: |
      Write a file called sort.py that reads integers from stdin (one per line)
      and prints them sorted in ascending order.
    model: "claude-sonnet-4-6"
    dir: "./workdir"
    variants:
      - name: baseline
      - name: with-skill
        skill: "./skills/python-best-practices.md"
      - name: opus-model
        model: "claude-opus-4-6"
        dir: "./workdir-opus"
      - name: with-env
        env:
          STYLE: "functional"
          LANGUAGE: "python"
      - name: custom-runner-config
        runner_config:
          max_turns: 5
          allowed_tools:
            - Read
            - Write
            - Bash
