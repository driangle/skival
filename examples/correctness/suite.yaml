# All verification modes.
version: 1
description: "Demonstrates every verify step type"

defaults:
  runner: claude-code
  model: "claude-sonnet-4-6"
  samples: 2
  timeout: 60

evals:
  # Verify via a shell command (check)
  - id: check-verify
    dir: "./workdir"
    prompt: "Write a Go program in main.go that prints 'hello'."
    verify:
      - type: check
        run: "go build ./..."
    variants:
      - name: baseline

  # Verify that the agent exits successfully
  - id: agent-exits-ok-check
    dir: "./workdir"
    prompt: "Write a shell script run.sh that exits with code 0."
    verify:
      - type: agent_exits_ok
    variants:
      - name: baseline

  # Verify expected output strings appear in agent conversation output
  - id: expected-output-check
    dir: "./workdir"
    prompt: "What is 7 * 6? Reply with just the number."
    verify:
      - type: output_contains
        values:
          - "42"
    variants:
      - name: baseline

  # Verify via check_output (agent output piped to stdin)
  - id: check-output-verify
    dir: "./workdir"
    prompt: "Create a file called output.txt containing exactly 'hello world'."
    verify:
      - type: check_output
        run: "./scripts/verify-output.sh"
    variants:
      - name: baseline

  # Verify via HTTP checks
  - id: http-check
    dir: "./workdir"
    prompt: "Start a web server on port 8080 that responds to GET /health with 'ok' and GET /ready with 'ready'."
    verify:
      - type: http_check
        url: "http://localhost:8080/health"
        method: GET
        status: 200
        body_contains: "ok"
      - type: http_check
        url: "http://localhost:8080/ready"
        method: GET
        body_contains: "ready"
    variants:
      - name: baseline

  # Verify via file_contains
  - id: file-contains-check
    dir: "./workdir"
    prompt: "Create a file called output.txt containing 'hello world'."
    verify:
      - type: file_contains
        path: "output.txt"
        exists: true
        contains: "hello world"
    variants:
      - name: baseline

  # Verify via command
  - id: command-check
    dir: "./workdir"
    prompt: "Write a Go program in main.go that prints 'hello'."
    verify:
      - type: command
        run: "go build ./..."
        exits: 0
    variants:
      - name: baseline

  # Verify via TCP check
  - id: tcp-check
    dir: "./workdir"
    prompt: "Start a TCP server on port 9090."
    verify:
      - type: tcp_check
        host: "localhost"
        port: 9090
    variants:
      - name: baseline

  # Verify via LLM judge
  - id: judge-check
    dir: "./workdir"
    prompt: "Write a README.md explaining how to set up a Go project."
    verify:
      - type: judge
        criteria:
          - "Does the README explain how to initialize a Go module?"
          - "Does it include instructions for running tests?"
    variants:
      - name: baseline

  # Multiple verify steps combined
  - id: combined-check
    dir: "./workdir"
    prompt: |
      Write a Python script called calc.py that reads two numbers
      from stdin and prints their sum.
    verify:
      - type: agent_exits_ok
      - type: output_contains
        values:
          - "Result:"
      - type: check_output
        run: "./scripts/verify-calc.sh"
    variants:
      - name: baseline
