# Suite-level defaults inherited by all evals.
# Evals can override any default at the eval or variant level.
version: 1
description: "Demonstrates suite-level defaults"

defaults:
  model: "claude-sonnet-4-6"
  samples: 5
  timeout: 120
  runner: claude-code
  runner_config:
    max_turns: 10

evals:
  - id: uses-defaults
    dir: "./workdir"
    prompt: "Create a file called greeting.txt with a friendly greeting."
    verify:
      - type: agent_exits_ok
    variants:
      - name: baseline
      - name: fewer-turns
        runner_config:
          max_turns: 5

  - id: overrides-defaults
    dir: "./workdir"
    prompt: "Write a script that prints the current date."
    verify:
      - type: agent_exits_ok
    samples: 3
    timeout: 60
    model: "claude-opus-4-6"
    variants:
      - name: baseline
      - name: sonnet-model
        model: "claude-sonnet-4-6"
