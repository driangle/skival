# Evals with different sample counts and timeouts.
version: 1
description: "Demonstrates sample and timeout configuration"

defaults:
  runner: claude-code
  model: "claude-sonnet-4-6"

evals:
  - id: simple-task
    name: "Simple file creation"
    dir: "./workdir"
    prompt: "Create a file called hello.txt containing 'hello'."
    samples: 5
    timeout: 30
    variants:
      - name: baseline
      - name: opus-model
        model: "claude-opus-4-6"

  - id: medium-task
    name: "REST API endpoint"
    dir: "./workdir"
    prompt: |
      Write a Python Flask app in app.py with a GET /users endpoint
      that returns a JSON list of users.
    samples: 3
    timeout: 120
    variants:
      - name: baseline
      - name: opus-model
        model: "claude-opus-4-6"

  - id: large-task
    name: "Full CRUD application"
    dir: "./workdir"
    prompt: |
      Build a complete TODO application with a SQLite backend.
      Include CRUD endpoints, input validation, and error handling.
    samples: 2
    timeout: 300
    variants:
      - name: baseline
      - name: opus-model
        model: "claude-opus-4-6"
