# Runner and runner_config at defaults, eval, and variant levels.
# Shows override precedence: variant > eval > defaults.
version: 1
description: "Demonstrates runner_config override precedence"

defaults:
  model: "claude-sonnet-4-6"
  samples: 2
  runner: claude-code
  runner_config:
    max_turns: 20
    allowed_tools:
      - Read
      - Write
      - Bash
      - Glob
      - Grep

evals:
  # Inherits all defaults as-is
  - id: inherits-defaults
    dir: "./workdir"
    prompt: "Write hello.py that prints 'hello'."
    variants:
      - name: baseline
      - name: fewer-tools
        runner_config:
          allowed_tools:
            - Read
            - Write

  # Eval-level overrides merge with defaults
  - id: eval-override
    dir: "./workdir"
    prompt: "Write a test suite for a calculator module."
    runner_config:
      max_turns: 30              # overrides default of 20
      permission_mode: "plan"    # adds new key, defaults keys preserved
    variants:
      - name: baseline
      - name: fewer-turns
        runner_config:
          max_turns: 15

  # Variant-level overrides merge with eval + defaults
  - id: treatment-override
    dir: "./workdir"
    prompt: "Refactor the utils module into smaller files."
    runner_config:
      max_turns: 25
    variants:
      - name: baseline
      - name: restricted
        runner_config:
          max_turns: 10          # overrides eval's 25
          allowed_tools:         # overrides defaults
            - Read
            - Edit
