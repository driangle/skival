# Runner and runner_config at defaults, eval, and treatment levels.
# Shows override precedence: treatment > eval > defaults.
version: 1
description: "Demonstrates runner_config override precedence"

defaults:
  model: "claude-sonnet-4-6"
  samples: 2
  runner: claude-code
  runner_config:
    max_turns: 20
    allowed_tools:
      - Read
      - Write
      - Bash
      - Glob
      - Grep

evals:
  # Inherits all defaults as-is
  - id: inherits-defaults
    prompt: "Write hello.py that prints 'hello'."
    treatments:
      control:
        name: baseline
      variations:
        - name: fewer-tools
          runner_config:
            allowed_tools:
              - Read
              - Write

  # Eval-level overrides merge with defaults
  - id: eval-override
    prompt: "Write a test suite for a calculator module."
    runner_config:
      max_turns: 30              # overrides default of 20
      permission_mode: "plan"    # adds new key, defaults keys preserved
    treatments:
      control:
        name: baseline
      variations:
        - name: fewer-turns
          runner_config:
            max_turns: 15

  # Treatment-level overrides merge with eval + defaults
  - id: treatment-override
    prompt: "Refactor the utils module into smaller files."
    runner_config:
      max_turns: 25
    treatments:
      control:
        name: baseline
      variations:
        - name: restricted
          runner_config:
            max_turns: 10          # overrides eval's 25
            allowed_tools:         # overrides defaults
              - Read
              - Edit
