version: 1
description: "Skillset comparison — baseline vs single skill vs composed skillset"

defaults:
  runner: claude-code
  model: "claude-sonnet-4-6"
  samples: 3
  timeout: 60

evals:
  - id: fizzbuzz-skillset
    name: "FizzBuzz with skillsets"
    dir: "./workdir"
    prompt: |
      Write a file called fizzbuzz.sh that prints FizzBuzz output for numbers 1 through 20.
      Rules: print "Fizz" for multiples of 3, "Buzz" for multiples of 5,
      "FizzBuzz" for multiples of both, and the number itself otherwise.
      Each value on its own line.
    setup:
      reset: "rm -f fizzbuzz.sh *_test.sh"
    verify:
      - type: agent_exits_ok
      - type: check_output
        run: "./verify.sh"
    variants:
      - name: "baseline"
      - name: "shell-only"
        skill: "./skills/shell-best-practices.md"
      - name: "shell-and-testing"
        skills:
          - "./skills/shell-best-practices.md"
          - "./skills/testing-guidelines.md"
