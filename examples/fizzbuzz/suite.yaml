version: 1
description: "FizzBuzz benchmark — compare baseline vs shell best-practices skill"

defaults:
  runner: claude-code
  model: "claude-sonnet-4-6"
  samples: 3
  timeout: 60

evals:
  - id: fizzbuzz-basic
    name: "FizzBuzz 1-20"
    prompt: |
      Write a file called fizzbuzz.sh that prints FizzBuzz output for numbers 1 through 20.
      Rules: print "Fizz" for multiples of 3, "Buzz" for multiples of 5,
      "FizzBuzz" for multiples of both, and the number itself otherwise.
      Each value on its own line.
    complexity: low
    setup:
      reset: "rm -f fizzbuzz.sh"
    verify:
      - type: agent_exits_ok
      - type: check_output
        run: "./verify.sh"
    treatments:
      control:
        name: "baseline"
      variations:
        - name: "with-shell-skill"
          skill: "./skills/shell-best-practices.md"
